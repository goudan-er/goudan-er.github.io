---
layout: default
title: "图形学文章"
breadcrumb: true
permalink: "/graphics/archive/"
---
<section class="content-card archive-page">
  <h1>{{ page.title }}</h1>
  {% if page.teaser %}<p>{{ page.teaser }}</p>{% endif %}
  <ul class="archive-list">
    {% for post in site.categories.graphics limit:1000 %}
    <li>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <span>{{ post.date | date: "%Y-%m-%d" }}</span>
    </li>
    {% endfor %}
  </ul>
</section>
