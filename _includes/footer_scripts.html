<script>
  (function() {
    var toggle = document.querySelector('.nav-toggle');
    var navLinks = document.getElementById('site-nav-links');
    if (!toggle || !navLinks) {
      return;
    }

    toggle.addEventListener('click', function() {
      var expanded = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', String(!expanded));
      navLinks.classList.toggle('is-open', !expanded);
    });

    navLinks.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() {
        toggle.setAttribute('aria-expanded', 'false');
        navLinks.classList.remove('is-open');
      });
    });
  })();
</script>
{% if site.enable_google_analytics == true and site.google_analytics_tracking_id %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics_tracking_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() { dataLayer.push(arguments); }
  gtag('js', new Date());
  gtag('config', '{{ site.google_analytics_tracking_id }}', { 'anonymize_ip': true });
</script>
{% endif %}
