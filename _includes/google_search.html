{% assign all_posts = site.posts | sort: 'date' | reverse %}
{% capture search_hint %}{{ site.data.language.enter_search_term }}{% endcapture %}
<section class="content-card search-panel">
  <h2>站内搜索</h2>
  <p>本地即时过滤，不依赖外部搜索引擎。</p>
  <label for="local-search-input" class="search-panel__label">{{ search_hint }}</label>
  <input id="local-search-input" type="search" placeholder="{{ search_hint }}" autocomplete="off">
  <ul id="local-search-results" class="search-results">
    {% for post in all_posts %}
    <li data-search-item data-title="{{ post.title | downcase | escape }}" data-summary="{% if post.meta_description %}{{ post.meta_description | strip_html | downcase | escape }}{% elsif post.teaser %}{{ post.teaser | strip_html | downcase | escape }}{% elsif post.excerpt %}{{ post.excerpt | strip_html | downcase | escape }}{% endif %}">
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <span>{{ post.date | date: "%Y-%m-%d" }}</span>
    </li>
    {% endfor %}
  </ul>
</section>

<script>
  (function () {
    var input = document.getElementById('local-search-input');
    var resultItems = document.querySelectorAll('[data-search-item]');
    if (!input || !resultItems.length) {
      return;
    }
    input.addEventListener('input', function () {
      var query = input.value.trim().toLowerCase();
      resultItems.forEach(function (item) {
        var title = item.getAttribute('data-title') || '';
        var summary = item.getAttribute('data-summary') || '';
        var match = !query || title.indexOf(query) !== -1 || summary.indexOf(query) !== -1;
        item.style.display = match ? '' : 'none';
      });
    });
  })();
</script>
